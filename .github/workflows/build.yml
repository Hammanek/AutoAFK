name: Build Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller AutoAFK.spec
    
    - name: Copy files
      run: |
        New-Item -ItemType Directory -Path dist/AutoAFK -Force
        Copy-Item -Recurse img dist/AutoAFK/
        Copy-Item settings.ini.example dist/AutoAFK/
        Copy-Item README.md dist/AutoAFK/
        Copy-Item LICENSE dist/AutoAFK/
        Copy-Item QUICK_START.md dist/AutoAFK/
        if (Test-Path adb.exe) { Copy-Item adb.exe dist/AutoAFK/ }
        if (Test-Path AdbWinApi.dll) { Copy-Item AdbWinApi.dll dist/AutoAFK/ }
        Move-Item dist/AutoAFK.exe dist/AutoAFK/
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path dist/AutoAFK -DestinationPath AutoAFK-Windows.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: AutoAFK-Windows
        path: AutoAFK-Windows.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: AutoAFK-Windows.zip
        body_path: RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
